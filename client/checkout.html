<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Zovo</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="icon" type="image/png" href="./assets/tab-img.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="./index.html"><img src="./assets/logo.png" alt="logo"></a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button class="search-btn" type="submit"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/></svg></button>
            </div>
            <ul><li><a href="./index.html">Home</a></li></ul>
            <ul><li><a href="./products.html">Products</a></li></ul>
            <ul><li><a href="./about.html">About</a></li></ul>
            <ul><li><a href="./services.html">Services</a></li></ul>
            <ul><li><a href="./contact.html">Contact</a></li></ul>
            <ul><li><a href="./blog.html">Blog</a></li></ul>
            <ul>
                <li>
                    <span class="cart-icon-wrapper">
                        <a href="./addToCart.html" class="add-to-cart-btn"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-600v-120H320v-80h120v-120h80v120h120v80H520v120h-80ZM223.5-103.5Q200-127 200-160t23.5-56.5Q247-240 280-240t56.5 23.5Q360-193 360-160t-23.5 56.5Q313-80 280-80t-56.5-23.5Zm400 0Q600-127 600-160t23.5-56.5Q647-240 680-240t56.5 23.5Q760-193 760-160t-23.5 56.5Q713-80 680-80t-56.5-23.5ZM40-800v-80h131l170 360h280l156-280h91L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68.5-39t-1.5-79l54-98-144-304H40Z"/></svg></a>
                        <span id="cartCount" class="cart-count">0</span>
                    </span>
                </li>
            </ul>
            <div class="user-menu">
                <div class="user-info" id="userInfo">
                    <span id="userName">Guest</span>
                    <img id="userImage" src="./assets/default-avatar.png" alt="User">
                    <span class="dropdown-icon">&#9660;</span>
                </div>
                <div class="dropdown" id="dropdownMenu"></div>
            </div>
        </nav>
    </header>

    <main class="checkout-wrapper">
        <h2 class="page-title">Checkout</h2>

        <div class="checkout-grid">

            <!-- LEFT: Shipping Form -->
            <section class="checkout-form-card">
                <h3>Shipping Information</h3>
                <form id="checkoutForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="shipping_name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="shipping_phone" placeholder="+1 234 567 8900" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="shipping_address" placeholder="123 Main St" required>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="shipping_city" placeholder="New York" required>
                    </div>
                    <div class="form-group">
                        <label>Order Notes (optional)</label>
                        <textarea id="order_notes" rows="3" placeholder="Any special instructions..."></textarea>
                    </div>

                    <h3 class="section-sub">Coupon</h3>
                    <div class="coupon-row">
                        <input type="text" id="couponCode" placeholder="Enter coupon code">
                        <button type="button" id="applyCouponBtn" class="btn-outline">Apply</button>
                    </div>
                    <p id="couponMsg" class="coupon-msg"></p>

                    <h3 class="section-sub">Wallet</h3>
                    <div class="wallet-row">
                        <label class="toggle-label">
                            <input type="checkbox" id="useWallet">
                            Use wallet balance
                        </label>
                        <span id="walletBalanceDisplay" class="wallet-bal"></span>
                    </div>

                    <h3 class="section-sub">Payment Method</h3>
                    <div class="payment-options">
                        <label class="pay-option">
                            <input type="radio" name="payment_method" value="cod" checked>
                            <span>Cash on Delivery</span>
                        </label>
                        <label class="pay-option">
                            <input type="radio" name="payment_method" value="stripe">
                            <span>Credit / Debit Card (Stripe)</span>
                        </label>
                    </div>

                    <button type="submit" id="placeOrderBtn" class="btn-primary place-order-btn">Place Order</button>
                    <p id="orderMsg" class="order-msg"></p>
                </form>
            </section>

            <!-- RIGHT: Order Summary -->
            <aside class="order-summary-card">
                <h3>Order Summary</h3>
                <div id="summaryItems" class="summary-items"></div>
                <div class="summary-totals">
                    <div class="total-row"><span>Subtotal</span><span id="summarySubtotal">$0.00</span></div>
                    <div class="total-row discount-row" id="discountRow" style="display:none">
                        <span>Coupon Discount</span><span id="summaryDiscount">-$0.00</span>
                    </div>
                    <div class="total-row wallet-row" id="walletRow" style="display:none">
                        <span>Wallet Used</span><span id="summaryWallet">-$0.00</span>
                    </div>
                    <div class="total-row final-row"><span>Total</span><span id="summaryTotal">$0.00</span></div>
                </div>
            </aside>

        </div>
    </main>

    <script src="./script/config.js"></script>
    <script src="./script/script.js"></script>
    <script src="./script/navbar.js"></script>
    <script src="./script/checkout.js"></script>
</body>
</html>
